version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: simple-app:latest
    container_name: simple-app-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    # Бонус: Синхронизация кода для локальной разработки (без перезапуска сборки)
    # volumes:
    #   - ./app:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3